services:
  postgres:
    image: postgres:18.3-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-timesfm_fin}
      POSTGRES_USER: ${POSTGRES_USER:-timesfm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timesfm_dev}
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  postgres_data:
